<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>2.5D 世界 · Linger</title>
    <style>
      :root {
        --ink: #142033;
        --muted: #68758b;
        --soft: #929bad;
        --line: rgba(37, 52, 82, 0.12);
        --glass: rgba(255, 255, 255, 0.68);
        --glass-strong: rgba(255, 255, 255, 0.82);
        --green: #50d9b0;
        --cyan: #7bd7e3;
        --violet: #a989e8;
        --amber: #f3bd70;
        --rose: #ee9fab;
        --dark: #172236;
        --time-of-day: 0deg;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        width: 100%;
        height: 100vh;
        overflow: hidden;
      }

      body {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
        background: #0a0a14;
        color: #f7fbff;
      }

      .scene {
        position: relative;
        width: 100%;
        height: 100vh;
        overflow: hidden;
        background: radial-gradient(ellipse at 50% 120%, #1a2a4a 0%, #0a0a14 50%);
      }

      /* 天空背景层 */
      .sky {
        position: absolute;
        inset: 0;
        transition: background 2s ease;
      }

      .sky.day {
        background: linear-gradient(180deg, #87CEEB 0%, #98D8E8 30%, #B8E6F2 60%, #E8F4F8 100%);
      }

      .sky.sunset {
        background: linear-gradient(180deg, #2C3E50 0%, #E74C3C 25%, #F39C12 50%, #FFD89B 80%, #FFF5E6 100%);
      }

      .sky.night {
        background: linear-gradient(180deg, #0a0a1a 0%, #1a1a3a 40%, #2a2a5a 70%, #1a1a3a 100%);
      }

      /* 太阳 */
      .sun {
        position: absolute;
        width: 120px;
        height: 120px;
        border-radius: 50%;
        background: radial-gradient(circle, #FFE484 0%, #FFD700 40%, #FFA500 70%, transparent 100%);
        box-shadow: 
          0 0 60px #FFD700,
          0 0 120px #FFA500,
          0 0 200px rgba(255, 165, 0, 0.5);
        opacity: 0;
        transition: opacity 2s ease, transform 1s ease;
        filter: blur(2px);
      }

      .sky.day .sun {
        opacity: 1;
        animation: sun-pulse 4s ease-in-out infinite;
      }

      @keyframes sun-pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.1); }
      }

      /* 太阳光射线 */
      .sun-rays {
        position: absolute;
        width: 300px;
        height: 300px;
        opacity: 0;
        transition: opacity 2s ease;
      }

      .sky.day .sun-rays {
        opacity: 1;
      }

      .sun-ray {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 2px;
        height: 150px;
        background: linear-gradient(to top, rgba(255, 215, 0, 0.6), transparent);
        transform-origin: bottom center;
        animation: ray-rotate 20s linear infinite;
      }

      @keyframes ray-rotate {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      /* 月亮 */
      .moon {
        position: absolute;
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: radial-gradient(circle at 30% 30%, #F5F5F5 0%, #E0E0E0 50%, #BDBDBD 100%);
        box-shadow: 
          0 0 30px rgba(255, 255, 255, 0.4),
          0 0 80px rgba(200, 200, 255, 0.3),
          inset -10px -10px 20px rgba(0, 0, 0, 0.2);
        opacity: 0;
        transition: opacity 2s ease;
      }

      .moon-crater {
        position: absolute;
        border-radius: 50%;
        background: rgba(180, 180, 180, 0.4);
      }

      .moon-crater:nth-child(1) { width: 15px; height: 15px; top: 20%; left: 25%; }
      .moon-crater:nth-child(2) { width: 10px; height: 10px; top: 50%; left: 60%; }
      .moon-crater:nth-child(3) { width: 8px; height: 8px; top: 65%; left: 30%; }

      .sky.night .moon {
        opacity: 1;
        animation: moon-glow 3s ease-in-out infinite alternate;
      }

      @keyframes moon-glow {
        from { box-shadow: 0 0 30px rgba(255, 255, 255, 0.4), 0 0 80px rgba(200, 200, 255, 0.3), inset -10px -10px 20px rgba(0, 0, 0, 0.2); }
        to { box-shadow: 0 0 50px rgba(255, 255, 255, 0.6), 0 0 100px rgba(200, 200, 255, 0.4), inset -10px -10px 20px rgba(0, 0, 0, 0.2); }
      }

      /* 星星 */
      .stars {
        position: absolute;
        inset: 0;
        opacity: 0;
        transition: opacity 2s ease;
      }

      .sky.night .stars {
        opacity: 1;
      }

      .star {
        position: absolute;
        width: 3px;
        height: 3px;
        background: #fff;
        border-radius: 50%;
        animation: twinkle 2s ease-in-out infinite;
      }

      .star:nth-child(odd) { animation-duration: 3s; }
      .star:nth-child(3n) { animation-duration: 1.5s; }

      @keyframes twinkle {
        0%, 100% { opacity: 0.3; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.2); }
      }

      /* 云层 */
      .clouds {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .cloud {
        position: absolute;
        background: linear-gradient(180deg, rgba(255,255,255,0.9) 0%, rgba(200,220,255,0.6) 100%);
        border-radius: 50px;
        filter: blur(2px);
        animation: cloud-drift linear infinite;
      }

      .cloud::before,
      .cloud::after {
        content: '';
        position: absolute;
        background: inherit;
        border-radius: 50%;
      }

      .cloud-1 {
        width: 150px;
        height: 40px;
        top: 15%;
        left: -150px;
        animation-duration: 45s;
        opacity: 0.7;
      }

      .cloud-1::before {
        width: 60px;
        height: 60px;
        top: -30px;
        left: 20px;
      }

      .cloud-1::after {
        width: 80px;
        height: 80px;
        top: -40px;
        left: 50px;
      }

      .cloud-2 {
        width: 100px;
        height: 30px;
        top: 25%;
        left: -100px;
        animation-duration: 60s;
        animation-delay: -20s;
        opacity: 0.5;
      }

      .cloud-2::before {
        width: 40px;
        height: 40px;
        top: -20px;
        left: 15px;
      }

      .cloud-2::after {
        width: 50px;
        height: 50px;
        top: -25px;
        left: 40px;
      }

      .cloud-3 {
        width: 120px;
        height: 35px;
        top: 10%;
        left: -120px;
        animation-duration: 55s;
        animation-delay: -35s;
        opacity: 0.6;
      }

      .cloud-3::before {
        width: 50px;
        height: 50px;
        top: -25px;
        left: 20px;
      }

      .cloud-3::after {
        width: 70px;
        height: 70px;
        top: -35px;
        left: 50px;
      }

      @keyframes cloud-drift {
        from { transform: translateX(0); }
        to { transform: translateX(calc(100vw + 200px)); }
      }

      /* 雨效果 */
      .rain {
        position: absolute;
        inset: 0;
        pointer-events: none;
        opacity: 0;
        transition: opacity 1s ease;
      }

      .rain.active {
        opacity: 1;
      }

      .raindrop {
        position: absolute;
        width: 2px;
        height: 20px;
        background: linear-gradient(to bottom, transparent, rgba(174, 194, 224, 0.6));
        animation: rain-fall linear infinite;
      }

      @keyframes rain-fall {
        0% { transform: translateY(-20px); }
        100% { transform: translateY(100vh); }
      }

      /* 极光效果 */
      .aurora {
        position: absolute;
        inset: 0;
        opacity: 0;
        transition: opacity 3s ease;
        pointer-events: none;
      }

      .sky.night .aurora {
        opacity: 0.6;
      }

      .aurora-wave {
        position: absolute;
        width: 200%;
        height: 40%;
        top: 10%;
        left: -50%;
        background: linear-gradient(90deg, 
          transparent 0%,
          rgba(80, 217, 176, 0.3) 20%,
          rgba(169, 137, 232, 0.4) 40%,
          rgba(123, 215, 227, 0.3) 60%,
          rgba(80, 217, 176, 0.3) 80%,
          transparent 100%
        );
        filter: blur(30px);
        animation: aurora-flow 8s ease-in-out infinite;
      }

      .aurora-wave:nth-child(2) {
        top: 15%;
        animation-delay: -3s;
        animation-duration: 10s;
        opacity: 0.7;
      }

      @keyframes aurora-flow {
        0%, 100% { transform: translateX(-20%) skewX(-5deg); }
        50% { transform: translateX(20%) skewX(5deg); }
      }

      /* 星球 */
      .planet-container {
        position: absolute;
        bottom: 10%;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
      }

      .planet {
        width: 400px;
        height: 400px;
        border-radius: 50%;
        position: relative;
        animation: planet-float 6s ease-in-out infinite;
        box-shadow: 
          inset -60px -30px 100px rgba(0, 0, 0, 0.6),
          inset 20px 20px 60px rgba(255, 255, 255, 0.1);
      }

      @keyframes planet-float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-15px); }
      }

      .planet-surface {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        background: 
          radial-gradient(circle at 30% 30%, #4a90c2 0%, #2e5d8b 30%, #1a3d5c 60%, #0d1f33 100%);
        overflow: hidden;
      }

      /* 星球纹理 */
      .planet-terrain {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        background: 
          radial-gradient(ellipse 80px 60px at 25% 35%, rgba(80, 217, 176, 0.4) 0%, transparent 100%),
          radial-gradient(ellipse 120px 80px at 60% 45%, rgba(80, 217, 176, 0.3) 0%, transparent 100%),
          radial-gradient(ellipse 60px 40px at 45% 70%, rgba(80, 217, 176, 0.35) 0%, transparent 100%),
          radial-gradient(ellipse 100px 70px at 75% 60%, rgba(80, 217, 176, 0.25) 0%, transparent 100%),
          radial-gradient(ellipse 50px 35px at 20% 65%, rgba(80, 217, 176, 0.3) 0%, transparent 100%);
      }

      /* 星球云层 */
      .planet-clouds {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        background: 
          radial-gradient(ellipse 100px 40px at 30% 25%, rgba(255, 255, 255, 0.3) 0%, transparent 100%),
          radial-gradient(ellipse 80px 30px at 65% 40%, rgba(255, 255, 255, 0.25) 0%, transparent 100%),
          radial-gradient(ellipse 120px 45px at 50% 75%, rgba(255, 255, 255, 0.2) 0%, transparent 100%);
        animation: planet-clouds-rotate 30s linear infinite;
      }

      @keyframes planet-clouds-rotate {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      /* 大气层光晕 */
      .atmosphere {
        position: absolute;
        inset: -20px;
        border-radius: 50%;
        background: radial-gradient(circle, transparent 45%, rgba(123, 215, 227, 0.3) 50%, rgba(80, 217, 176, 0.2) 55%, transparent 60%);
        animation: atmosphere-glow 4s ease-in-out infinite alternate;
      }

      @keyframes atmosphere-glow {
        from { opacity: 0.7; transform: scale(1); }
        to { opacity: 1; transform: scale(1.02); }
      }

      .atmosphere-outer {
        position: absolute;
        inset: -40px;
        border-radius: 50%;
        background: radial-gradient(circle, transparent 55%, rgba(80, 217, 176, 0.15) 60%, transparent 65%);
      }

      /* 人物剪影 */
      .character {
        position: absolute;
        bottom: 48%;
        left: 50%;
        transform: translateX(-50%);
        z-index: 20;
      }

      .character svg {
        width: 60px;
        height: 100px;
        filter: drop-shadow(0 0 10px rgba(0, 0, 0, 0.5));
      }

      /* 地面/星球阴影 */
      .planet-shadow {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        background: linear-gradient(135deg, transparent 40%, rgba(0, 0, 0, 0.4) 100%);
      }

      /* 氛围粒子 */
      .particles {
        position: absolute;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
      }

      .particle {
        position: absolute;
        border-radius: 50%;
        animation: float-particle linear infinite;
      }

      @keyframes float-particle {
        0% { transform: translateY(100vh) scale(0); opacity: 0; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { transform: translateY(-100vh) scale(1); opacity: 0; }
      }

      /* 时间控制UI */
      .time-controls {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 12px;
        z-index: 100;
        padding: 12px 20px;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        border-radius: 30px;
        border: 1px solid rgba(255, 255, 255, 0.15);
      }

      .time-btn {
        padding: 8px 16px;
        border: none;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.15);
        color: rgba(255, 255, 255, 0.8);
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        font-family: inherit;
      }

      .time-btn:hover {
        background: rgba(255, 255, 255, 0.25);
        color: #fff;
      }

      .time-btn.active {
        background: rgba(80, 217, 176, 0.6);
        color: #fff;
      }

      .weather-controls {
        position: fixed;
        top: 30px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 12px;
        z-index: 100;
        padding: 12px 20px;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        border-radius: 30px;
        border: 1px solid rgba(255, 255, 255, 0.15);
      }

      .weather-btn {
        padding: 8px 16px;
        border: none;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.15);
        color: rgba(255, 255, 255, 0.8);
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        font-family: inherit;
      }

      .weather-btn:hover {
        background: rgba(255, 255, 255, 0.25);
        color: #fff;
      }

      .weather-btn.active {
        background: rgba(169, 137, 232, 0.6);
        color: #fff;
      }

      /* 标题 */
      .title-overlay {
        position: fixed;
        top: 100px;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
        z-index: 50;
        pointer-events: none;
      }

      .title-overlay h1 {
        font-size: 28px;
        font-weight: 700;
        background: linear-gradient(135deg, var(--green), var(--cyan), var(--violet));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-shadow: 0 0 40px rgba(80, 217, 176, 0.3);
        margin-bottom: 8px;
      }

      .title-overlay p {
        font-size: 14px;
        color: rgba(255, 255, 255, 0.6);
        font-weight: 400;
      }

      /* 响应式 */
      @media (max-width: 768px) {
        .planet {
          width: 280px;
          height: 280px;
        }
        
        .character svg {
          width: 40px;
          height: 70px;
        }

        .time-controls, .weather-controls {
          padding: 10px 15px;
          gap: 8px;
        }

        .time-btn, .weather-btn {
          padding: 6px 12px;
          font-size: 12px;
        }

        .title-overlay h1 {
          font-size: 22px;
        }
      }
    </style>
  </head>
  <body>
    <div class="scene">
      <!-- 天空背景 -->
      <div class="sky" id="sky">
        <!-- 太阳 -->
        <div class="sun" id="sun"></div>
        <div class="sun-rays" id="sunRays"></div>
        
        <!-- 月亮 -->
        <div class="moon" id="moon">
          <div class="moon-crater"></div>
          <div class="moon-crater"></div>
          <div class="moon-crater"></div>
        </div>
        
        <!-- 星星 -->
        <div class="stars" id="stars"></div>
        
        <!-- 云层 -->
        <div class="clouds" id="clouds">
          <div class="cloud cloud-1"></div>
          <div class="cloud cloud-2"></div>
          <div class="cloud cloud-3"></div>
        </div>

        <!-- 极光 -->
        <div class="aurora" id="aurora">
          <div class="aurora-wave"></div>
          <div class="aurora-wave"></div>
        </div>

        <!-- 雨 -->
        <div class="rain" id="rain"></div>
      </div>

      <!-- 氛围粒子 -->
      <div class="particles" id="particles"></div>

      <!-- 标题 -->
      <div class="title-overlay">
        <h1>2.5D 虚拟世界</h1>
        <p>与沈鹿溪共同生活的虚拟空间</p>
      </div>

      <!-- 星球 -->
      <div class="planet-container">
        <div class="atmosphere-outer"></div>
        <div class="atmosphere"></div>
        <div class="planet">
          <div class="planet-shadow"></div>
          <div class="planet-surface">
            <div class="planet-terrain"></div>
            <div class="planet-clouds"></div>
          </div>
        </div>
        
        <!-- 人物 -->
        <div class="character">
          <svg viewBox="0 0 60 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- 头发 -->
            <ellipse cx="30" cy="18" rx="14" ry="15" fill="#2a2a3a"/>
            <ellipse cx="30" cy="15" rx="12" ry="12" fill="#3a3a4a"/>
            <!-- 头部 -->
            <ellipse cx="30" cy="20" rx="11" ry="12" fill="#f5d0c5"/>
            <!-- 眼睛 -->
            <ellipse cx="25" cy="19" rx="2" ry="2.5" fill="#2a2a3a"/>
            <ellipse cx="35" cy="19" rx="2" ry="2.5" fill="#2a2a3a"/>
            <!-- 微笑 -->
            <path d="M26 25 Q30 28 34 25" stroke="#c9a090" stroke-width="1.5" fill="none" stroke-linecap="round"/>
            <!-- 脖子 -->
            <rect x="27" y="31" width="6" height="6" fill="#f5d0c5"/>
            <!-- 身体 -->
            <path d="M20 37 L18 65 L42 65 L40 37 Q30 35 20 37" fill="#5a6a8a"/>
            <!-- 衣服装饰 -->
            <path d="M25 37 L30 42 L35 37" stroke="#7bd7e3" stroke-width="2" fill="none"/>
            <!-- 手臂 -->
            <path d="M20 40 Q12 50 14 62" stroke="#f5d0c5" stroke-width="6" fill="none" stroke-linecap="round"/>
            <path d="M40 40 Q48 50 46 62" stroke="#f5d0c5" stroke-width="6" fill="none" stroke-linecap="round"/>
            <!-- 腿 -->
            <rect x="22" y="65" width="7" height="25" rx="3" fill="#3a4a5a"/>
            <rect x="31" y="65" width="7" height="25" rx="3" fill="#3a4a5a"/>
            <!-- 鞋子 -->
            <ellipse cx="25.5" cy="92" rx="6" ry="4" fill="#2a2a3a"/>
            <ellipse cx="34.5" cy="92" rx="6" ry="4" fill="#2a2a3a"/>
          </svg>
        </div>
      </div>

      <!-- 时间控制 -->
      <div class="time-controls">
        <button class="time-btn" data-time="day">白天</button>
        <button class="time-btn" data-time="sunset">黄昏</button>
        <button class="time-btn active" data-time="night">夜晚</button>
      </div>

      <!-- 天气控制 -->
      <div class="weather-controls">
        <button class="weather-btn active" data-weather="clear">晴朗</button>
        <button class="weather-btn" data-weather="cloudy">多云</button>
        <button class="weather-btn" data-weather="rainy">下雨</button>
      </div>
    </div>

    <script>
      // 初始化星星
      function createStars() {
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 100; i++) {
          const star = document.createElement('div');
          star.className = 'star';
          star.style.left = Math.random() * 100 + '%';
          star.style.top = Math.random() * 60 + '%';
          star.style.animationDelay = Math.random() * 3 + 's';
          star.style.width = (Math.random() * 2 + 1) + 'px';
          star.style.height = star.style.width;
          starsContainer.appendChild(star);
        }
      }

      // 初始化氛围粒子
      function createParticles() {
        const particlesContainer = document.getElementById('particles');
        const colors = ['#50d9b0', '#7bd7e3', '#a989e8', '#f3bd70'];
        
        for (let i = 0; i < 20; i++) {
          const particle = document.createElement('div');
          particle.className = 'particle';
          particle.style.left = Math.random() * 100 + '%';
          particle.style.width = (Math.random() * 4 + 2) + 'px';
          particle.style.height = particle.style.width;
          particle.style.background = colors[Math.floor(Math.random() * colors.length)];
          particle.style.animationDuration = (Math.random() * 10 + 8) + 's';
          particle.style.animationDelay = Math.random() * 10 + 's';
          particle.style.opacity = Math.random() * 0.4 + 0.2;
          particlesContainer.appendChild(particle);
        }
      }

      // 初始化太阳射线
      function createSunRays() {
        const sunRays = document.getElementById('sunRays');
        for (let i = 0; i < 12; i++) {
          const ray = document.createElement('div');
          ray.className = 'sun-ray';
          ray.style.transform = `rotate(${i * 30}deg)`;
          ray.style.animationDelay = `${-i * 1.5}s`;
          sunRays.appendChild(ray);
        }
      }

      // 初始化雨滴
      function createRaindrops() {
        const rain = document.getElementById('rain');
        for (let i = 0; i < 100; i++) {
          const drop = document.createElement('div');
          drop.className = 'raindrop';
          drop.style.left = Math.random() * 100 + '%';
          drop.style.animationDuration = (Math.random() * 0.5 + 0.5) + 's';
          drop.style.animationDelay = Math.random() * 2 + 's';
          drop.style.opacity = Math.random() * 0.5 + 0.3;
          rain.appendChild(drop);
        }
      }

      // 设置天空状态
      function setSkyState(time) {
        const sky = document.getElementById('sky');
        const sun = document.getElementById('sun');
        const moon = document.getElementById('moon');
        const stars = document.getElementById('stars');
        const aurora = document.getElementById('aurora');
        const clouds = document.getElementById('clouds');
        
        // 移除所有状态类
        sky.classList.remove('day', 'sunset', 'night');
        
        // 设置太阳/月亮位置
        switch(time) {
          case 'day':
            sky.classList.add('day');
            sun.style.top = '15%';
            sun.style.left = '75%';
            moon.style.top = '-100px';
            moon.style.left = '-100px';
            clouds.style.opacity = '1';
            break;
          case 'sunset':
            sky.classList.add('sunset');
            sun.style.top = '35%';
            sun.style.left = '15%';
            moon.style.top = '60%';
            moon.style.left = '75%';
            clouds.style.opacity = '0.8';
            break;
          case 'night':
            sky.classList.add('night');
            sun.style.top = '-100px';
            sun.style.left = '-100px';
            moon.style.top = '20%';
            moon.style.left = '75%';
            clouds.style.opacity = '0.3';
            break;
        }
        
        // 更新按钮状态
        document.querySelectorAll('.time-btn').forEach(btn => {
          btn.classList.toggle('active', btn.dataset.time === time);
        });
      }

      // 设置天气状态
      function setWeatherState(weather) {
        const rain = document.getElementById('rain');
        const clouds = document.getElementById('clouds');
        
        rain.classList.remove('active');
        
        switch(weather) {
          case 'clear':
            clouds.style.opacity = '0.3';
            break;
          case 'cloudy':
            clouds.style.opacity = '1';
            break;
          case 'rainy':
            clouds.style.opacity = '1';
            rain.classList.add('active');
            break;
        }
        
        // 更新按钮状态
        document.querySelectorAll('.weather-btn').forEach(btn => {
          btn.classList.toggle('active', btn.dataset.weather === weather);
        });
      }

      // 绑定事件
      document.querySelectorAll('.time-btn').forEach(btn => {
        btn.addEventListener('click', () => setSkyState(btn.dataset.time));
      });

      document.querySelectorAll('.weather-btn').forEach(btn => {
        btn.addEventListener('click', () => setWeatherState(btn.dataset.weather));
      });

      // 初始化
      createStars();
      createParticles();
      createSunRays();
      createRaindrops();
      setSkyState('night');
      setWeatherState('clear');

      // 自动昼夜循环（可选，每30秒切换一次）
      // const timeStates = ['day', 'sunset', 'night'];
      // let currentTimeIndex = 2; // 从夜晚开始
      // setInterval(() => {
      //   currentTimeIndex = (currentTimeIndex + 1) % timeStates.length;
      //   setSkyState(timeStates[currentTimeIndex]);
      // }, 30000);
    </script>
  </body>
</html>
