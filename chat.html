<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Linger · 对话</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Spectral:wght@600&display=swap" rel="stylesheet">
  </head>
  <body class="chat-page">
    <!-- 顶部导航栏 -->
    <header class="chat-header">
      <div class="header-left">
        <a href="index.html" class="back-btn" aria-label="返回首页">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5"></path>
            <path d="m12 19-7-7 7-7"></path>
          </svg>
        </a>
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 120 120" fill="none">
            <path d="M60 12 96 33.5v45c0 6-3.2 11.5-8.4 14.5l-19.2 11.1a16.8 16.8 0 0 1-16.8 0L32.4 93A16.8 16.8 0 0 1 24 78.5v-45L60 12Z" fill="#16213E" />
            <path d="M42 39 60 28.5 78 39 60 49.5 42 39Z" stroke="#fff" stroke-width="5" stroke-linejoin="round" />
            <circle cx="60" cy="58" r="8" fill="#fff" />
            <path d="M45 84c0-9 6.4-15 15-15s15 6 15 15v4H45v-4Z" fill="#fff" />
          </svg>
        </div>
        <div class="brand-info">
          <span class="brand-name">Linger</span>
          <span class="brand-status">
            <span class="status-dot"></span>
            沈鹿溪 · 在线
          </span>
        </div>
      </div>
      <div class="header-right">
        <button class="header-icon-btn" aria-label="在线状态">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12.55a11 11 0 0 1 14.08 0"></path>
            <path d="M1.42 9a16 16 0 0 1 21.16 0"></path>
            <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
            <circle cx="12" cy="20" r="1"></circle>
          </svg>
        </button>
        <button class="header-icon-btn" aria-label="历史消息">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
          </svg>
        </button>
        <button class="header-icon-btn" aria-label="用户中心">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="8" r="4"></circle>
            <path d="M20 21a8 8 0 1 0-16 0"></path>
          </svg>
        </button>
      </div>
    </header>

    <!-- 主内容区 -->
    <main class="chat-main">
      <!-- 左侧侧边栏 -->
      <aside class="sidebar">
        <!-- 角色核心信息区 -->
        <div class="profile-header">
          <div class="avatar-simple" aria-hidden="true">鹿</div>
          <h1 class="profile-name">沈鹿溪</h1>
          <p class="profile-desc">温柔陪伴 · 克制回应</p>
        </div>

        <!-- 状态概览区 -->
        <section class="sidebar-section">
          <div class="section-header">
            <svg class="section-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 20V10"></path>
              <path d="M18 20V4"></path>
              <path d="M6 20v-4"></path>
            </svg>
            <span class="section-title">状态概览</span>
          </div>
          <div class="status-list">
            <div class="status-item">
              <span class="status-label">情绪稳定</span>
              <div class="status-bar"><div class="status-fill" style="width: 78%"></div></div>
              <span class="status-value">78%</span>
            </div>
            <div class="status-item">
              <span class="status-label">记忆活跃</span>
              <div class="status-bar"><div class="status-fill" style="width: 66%"></div></div>
              <span class="status-value">66%</span>
            </div>
            <div class="status-item">
              <span class="status-label">边界清晰</span>
              <div class="status-bar"><div class="status-fill" style="width: 91%"></div></div>
              <span class="status-value">91%</span>
            </div>
          </div>
        </section>

        <!-- 回应模式区 -->
        <section class="sidebar-section">
          <div class="section-header">
            <svg class="section-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
            </svg>
            <span class="section-title">回应模式</span>
          </div>
          <div class="mode-tags">
            <button class="mode-tag active">温和回应</button>
            <button class="mode-tag">少量追问</button>
            <button class="mode-tag">不急于结论</button>
          </div>
        </section>

        <!-- 今日动态区 -->
        <section class="sidebar-section collapsible">
          <div class="section-header clickable">
            <svg class="section-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path>
              <polyline points="14 2 14 8 20 8"></polyline>
              <line x1="16" y1="13" x2="8" y2="13"></line>
              <line x1="16" y1="17" x2="8" y2="17"></line>
              <line x1="10" y1="9" x2="8" y2="9"></line>
            </svg>
            <span class="section-title">今日动态</span>
            <span class="section-time">15:42</span>
            <svg class="collapse-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
          </div>
          <div class="section-content">
            <p class="daily-note">今日安静，为你停留。</p>
          </div>
        </section>

        <!-- 世界同步区 -->
        <section class="sidebar-section collapsible">
          <div class="section-header clickable">
            <svg class="section-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12a9 9 0 1 1-6.219-8.56"></path>
            </svg>
            <span class="section-title">世界同步</span>
            <span class="section-badge">低频</span>
            <svg class="collapse-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
          </div>
          <div class="section-content">
            <div class="sync-bar">
              <div class="sync-fill" style="width: 45%"></div>
            </div>
          </div>
        </section>

        <!-- 底部功能入口 -->
        <div class="sidebar-footer">
          <a href="settings.html" class="footer-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"></circle>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
            </svg>
            <span>设置</span>
          </a>
          <a href="whitebox.html" class="footer-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
              <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
              <line x1="12" y1="22.08" x2="12" y2="12"></line>
            </svg>
            <span>白盒</span>
          </a>
        </div>
      </aside>

      <!-- 右侧聊天区 -->
      <section class="chat-area">
        <div class="chat-messages" id="chatMessages">
          <!-- 欢迎态（初始显示） -->
          <div class="welcome-section" id="welcomeSection">
            <h2 class="welcome-title">回来了。我在。</h2>
            <p class="welcome-subtitle">想说什么都可以，我在听。</p>
          </div>
        </div>

        <form class="chat-input-area" id="chatForm">
          <div class="input-add-wrapper">
            <button type="button" class="input-add-btn" id="addBtn" aria-label="添加">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
              </svg>
            </button>
            <!-- +号菜单 -->
            <div class="add-menu" id="addMenu">
              <button type="button" class="add-menu-item" id="imageBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                  <circle cx="8.5" cy="8.5" r="1.5"></circle>
                  <polyline points="21 15 16 10 5 21"></polyline>
                </svg>
                <span>发送图片</span>
              </button>
              <button type="button" class="add-menu-item" id="fileBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                  <polyline points="14 2 14 8 20 8"></polyline>
                  <line x1="16" y1="13" x2="8" y2="13"></line>
                  <line x1="16" y1="17" x2="8" y2="17"></line>
                  <polyline points="10 9 9 9 8 9"></polyline>
                </svg>
                <span>发送文件</span>
              </button>
            </div>
          </div>
          <input type="text" id="messageInput" placeholder="说点什么…" aria-label="聊天输入" autocomplete="off" />
          <button type="submit" class="send-btn" id="sendBtn" aria-label="发送" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </form>
      </section>
    </main>

    <script>
      (function() {
        'use strict';

        // DOM 元素
        var chatMessages = document.getElementById('chatMessages');
        var welcomeSection = document.getElementById('welcomeSection');
        var chatForm = document.getElementById('chatForm');
        var messageInput = document.getElementById('messageInput');
        var sendBtn = document.getElementById('sendBtn');
        var addBtn = document.getElementById('addBtn');
        var addMenu = document.getElementById('addMenu');
        var imageBtn = document.getElementById('imageBtn');
        var fileBtn = document.getElementById('fileBtn');

        // 状态
        var hasConversationStarted = false;
        var isMenuOpen = false;

        // AI 固定回复
        var AI_REPLY = '我收到了。慢慢说，我一直都在。';

        // ========== 侧边栏折叠功能 ==========
        document.querySelectorAll('.sidebar-section.collapsible .section-header.clickable').forEach(function(header) {
          header.addEventListener('click', function() {
            var section = this.closest('.sidebar-section');
            section.classList.toggle('collapsed');
          });
        });

        // ========== 回应模式切换 ==========
        document.querySelectorAll('.mode-tag').forEach(function(tag) {
          tag.addEventListener('click', function() {
            document.querySelectorAll('.mode-tag').forEach(function(t) {
              t.classList.remove('active');
            });
            this.classList.add('active');
          });
        });

        // ========== +号菜单功能 ==========
        function toggleMenu() {
          isMenuOpen = !isMenuOpen;
          if (isMenuOpen) {
            addMenu.classList.add('visible');
            addBtn.classList.add('active');
          } else {
            addMenu.classList.remove('visible');
            addBtn.classList.remove('active');
          }
        }

        function closeMenu() {
          if (isMenuOpen) {
            isMenuOpen = false;
            addMenu.classList.remove('visible');
            addBtn.classList.remove('active');
          }
        }

        addBtn.addEventListener('click', function(e) {
          e.stopPropagation();
          toggleMenu();
        });

        // 点击页面空白处关闭菜单
        document.addEventListener('click', function(e) {
          if (!addMenu.contains(e.target) && e.target !== addBtn) {
            closeMenu();
          }
        });

        // 图片/文件按钮点击（仅UI框架）
        imageBtn.addEventListener('click', function() {
          console.log('图片发送功能（待开发）');
          closeMenu();
        });

        fileBtn.addEventListener('click', function() {
          console.log('文件发送功能（待开发）');
          closeMenu();
        });

        // ========== 发送按钮状态 ==========
        function updateSendButton() {
          var hasContent = messageInput.value.trim().length > 0;
          sendBtn.disabled = !hasContent;
          if (hasContent) {
            sendBtn.classList.add('enabled');
          } else {
            sendBtn.classList.remove('enabled');
          }
        }

        messageInput.addEventListener('input', updateSendButton);

        // ========== 创建消息元素 ==========
        function createMessageElement(text, isUser) {
          var messageDiv = document.createElement('div');
          messageDiv.className = 'message ' + (isUser ? 'user' : 'assistant');

          var headerDiv = document.createElement('div');
          headerDiv.className = 'message-header';

          var senderSpan = document.createElement('span');
          senderSpan.className = 'message-sender';
          senderSpan.textContent = isUser ? '你' : '沈鹿溪';

          var bubbleDiv = document.createElement('div');
          bubbleDiv.className = 'message-bubble';
          bubbleDiv.textContent = text;

          headerDiv.appendChild(senderSpan);
          messageDiv.appendChild(headerDiv);
          messageDiv.appendChild(bubbleDiv);

          return messageDiv;
        }

        // ========== 隐藏欢迎态 ==========
        function hideWelcomeSection() {
          if (welcomeSection && !welcomeSection.classList.contains('hidden')) {
            welcomeSection.classList.add('hidden');
            // 动画结束后从DOM移除
            setTimeout(function() {
              if (welcomeSection.parentNode) {
                welcomeSection.parentNode.removeChild(welcomeSection);
              }
            }, 400);
          }
        }

        // ========== 发送消息 ==========
        function sendMessage(text) {
          if (!text.trim()) return;

          // 首次发送时隐藏欢迎态
          if (!hasConversationStarted) {
            hasConversationStarted = true;
            hideWelcomeSection();
          }

          // 添加用户消息
          var userMessage = createMessageElement(text, true);
          chatMessages.appendChild(userMessage);

          // 触发重绘以启动动画
          void userMessage.offsetHeight;
          userMessage.classList.add('animate-in');

          // 滚动到底部
          chatMessages.scrollTop = chatMessages.scrollHeight;

          // 清空输入框
          messageInput.value = '';
          updateSendButton();

          // 延迟后添加AI回复
          setTimeout(function() {
            var aiMessage = createMessageElement(AI_REPLY, false);
            chatMessages.appendChild(aiMessage);

            // 触发重绘以启动动画
            void aiMessage.offsetHeight;
            aiMessage.classList.add('animate-in');

            // 滚动到底部
            chatMessages.scrollTop = chatMessages.scrollHeight;
          }, 200);
        }

        // ========== 表单提交 ==========
        chatForm.addEventListener('submit', function(e) {
          e.preventDefault();
          var text = messageInput.value.trim();
          if (text) {
            sendMessage(text);
          }
        });

        // 初始化
        updateSendButton();
      })();
    </script>
  </body>
</html>
